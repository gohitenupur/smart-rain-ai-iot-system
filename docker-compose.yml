services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-rain-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_rain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart-rain-backend
    environment:
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: super-secret-key
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: smart_rain
      PYTHON_EXECUTABLE: python3
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smart-rain-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
